<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatQuest - Dungeon</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dungeon.css') }}">
</head>
<body>
    <div class="container-fluid px-3">
        <div class="row">
            <div class="col">
                <div class="p-3">
                    <nav class="navbar navbar-expand navbar-light bg-grey border border-4 border-light-subtle rounded-3">
                        <div class="container-fluid">
                            <a class="navbar-brand px-3 h1 mb-0" href="{{ url_for('main.home') }}">
                                <span class="text-light-emphasis">Cat</span>Quest - Dungeon </a>
                            <ul class="navbar-nav ms-auto px-3">
                                <li class="nav-item">
                                    <a class="nav-link" href="{{ url_for('main.shop') }}">Shop</a>
                                </li>
                            </ul>
                        </div>
                    </nav>
                </div>
            </div>
        </div>
        <div class="battle-page">
            <main id="battle-area" class="border border-4 border-light-subtle rounded-3" aria-label="Dungeon battle area">
                <section id="player-unit" class="battle-unit" aria-label="Player">
                    <div id="player-hud" class="unit-panel">
                        <div class="hp-row">
                            <span class="hp-label">HP</span>
                            <span id="player-hp-text" class="hp-text">30 / 30</span>
                        </div>
                        <div class="hp-bar-bg" aria-hidden="true">
                            <div id="player-hp-fill" class="hp-bar-fill"></div>
                        </div>
                    </div>

                    <img id="player-sprite" src="{{ url_for('static', filename='images/catsprite-s.png') }}" alt="Player cat sprite">

                    <div id="player-actions" class="unit-actions">
                        <button id="btn-damage" class="btn btn-outline-danger btn-sm" type="button">Do 5 damage</button>
                        <button id="btn-heal" class="btn btn-outline-success btn-sm" type="button"><span
                            class="placeholder col-3 placeholder-lg bg-primary"
                        ></span>
                        </button>
                        <button id="btn-run" class="btn btn-outline-secondary btn-sm" type="button">Run</button>
                        <button id="btn-start" class="btn btn-outline-primary btn-sm" type="button">New Battle</button>
                    </div>
                </section>

                <section id="enemy-unit" class="battle-unit" aria-label="Enemy">
                    <div id="enemy-hud" class="unit-panel">
                        <div class="hp-row">
                            <span class="hp-label">HP</span>
                            <span id="enemy-hp-text" class="hp-text">20 / 20</span>
                        </div>
                        <div class="hp-bar-bg" aria-hidden="true">
                            <div id="enemy-hp-fill" class="hp-bar-fill"></div>
                        </div>
                    <img id="enemy-sprite" src="{{ url_for('static', filename='images/ecatsprite.png') }}" alt="Enemy cat sprite">
                </section>
            </main>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/dungeon.js') }}"></script>
</body>
</html>
