<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - CatQuest</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/shop.css') }}">
</head>
<body>
    <div class="container-fluid px-3">
        <div class="row">
            <div class="col">
                <div class="p-3">
                    <nav class="navbar navbar-expand navbar-light bg-grey border border-4 border-light-subtle rounded-3">
                        <div class="container-fluid">
                            <a class="navbar-brand px-3 h1 mb-0" href="{{ url_for('main.home') }}">
                                <span class="text-light-emphasis">Cat</span>Quest - Dungeon </a>
                            <ul class="navbar-nav ms-auto px-3">
                                <li class="nav-item">
                                    <a class="nav-link" href="{{ url_for('main.dungeon') }}">Dungeon</a>
                                </li>
                            </ul>
                        </div>
                    </nav>
                </div>
            </div>
        </div>

    <section class="row g-4 align-items-start">
      <!-- Left side: featured cat panel that stays visible while scrolling -->
      <div class="col-lg-5 shop-sidebar-column">
        <div class="card shop-feature-card shop-fixed-panel border-0 shadow-sm rounded-4 overflow-hidden h-100">
          <div class="card-body shop-feature-body p-4 text-center">
            <!-- Intro text for the featured character area -->
            <p id="player-username" class="text-uppercase text-muted fw-semibold small mb-2">
  Loading...
</p>
            <h1 class="h3 fw-bold mb-3">Gear up your cat</h1>

            <!-- Larger cat sprite display -->
            <div class="shop-cat-frame position-relative mx-auto d-flex justify-content-center align-items-center">
              <img
                src="{{ url_for('static', filename='images/catsprite-s.png') }}"
                alt="Avatar"
                class="img-fluid shop-cat-image"
              >
            </div>

            <!-- Current player gold display -->
            <div class="shop-gold-panel mt-4">
              <p class="text-uppercase text-muted fw-semibold shop-gold-label mb-1">Current Gold</p>
              <h3 class="shop-gold-value mb-0"><span id="shop-gold-amount">0</span> gold</h3>
            </div>
          </div>
        </div>
      </div>

      <!-- Right side: shop controls and weapon list -->
      <div class="col-lg-7">
        <!-- Shop heading and back button -->
        <div class="shop-header d-flex justify-content-between align-items-center mb-3">
          <div>
            <h2 id="shop-title" class="h3 mb-1">Sword Shop</h2>
            <p id="shop-subtitle" class="shop-subtitle text-secondary mb-0">Choose a sword and head back into battle.</p>
          </div>
          <a href="{{ url_for('main.home') }}" class="btn btn-outline-secondary">Back</a>
        </div>

        <div class="shop-tabs btn-group mb-4" role="group" aria-label="Shop category">
          <button id="sword-shop-button" class="btn btn-primary shop-tab-button active" type="button" data-shop-target="swords">Sword Shop</button>
          <button id="hat-shop-button" class="btn btn-outline-primary shop-tab-button" type="button" data-shop-target="hats">Hat Shop</button>
        </div>

        <!-- Special shop feature for a gamble-style purchase with random rewards. -->
        <div class="card border-0 shadow-sm rounded-4 mb-4">
          <div class="card-body p-4">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
              <div>
                <p class="text-uppercase text-muted fw-semibold small mb-1">Special Offer</p>
                <h3 class="h5 mb-1">Mystery Box</h3>
                <p class="text-secondary mb-0">For only 100 gold, have the chance to win 5000 gold!</p>
              </div>
              <button id="buy-mystery-box-button" class="btn btn-warning fw-semibold">Open for 100 Gold</button>
            </div>
          </div>
        </div>

        <!-- Shop card Template-->
        <template id="shop-card-template">
          <div class="col">
            <div class="card shop-item-card h-100 border-0 shadow-sm rounded-4">
              <img class="card-image-top m-3" src="" alt="an image">
              <div class="card-body d-flex flex-column">
                <h5 class="card-title"></h5>
                <p class="card-text text-secondary mb-4">Cost: </p>
                <button class="btn btn-primary mt-auto buy-weapon-button" data-cost="" data-item-name="">Buy</button>
                <button class="btn btn-outline-secondary mt-2 inspect-weapon-button" type="button" aria-expanded="false">Inspect</button>

                <div class="inspect-weapon-details d-none mt-3">
                  <p class="small text-secondary mb-1"></p>
                  <p class="small fw-semibold mb-0"></p>
                </div>

              </div>
            </div>
          </div>
        </template>

        <!-- Responsive grid of shop items -->
        <div id="sword-shop-grid" class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4 shop-items-grid">
        </div>

        <div id="hat-shop-grid" class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4 shop-items-grid d-none">
        </div>
      </div>
    </section>
  </div>

  <div class="shop-bottom-controls text-center pb-4">
    <button id="add-gold-button" class="btn btn-success btn-sm">Add 500 Gold</button>
  </div>

  <!-- Loads shared game logic, including the gold helper functions -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
  <script src="{{ url_for('static', filename='js/shop.js') }}"></script>
</body>
</html>
