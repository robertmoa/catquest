<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - CatQuest</title>

  <link rel="stylesheet" href="main.css">
</head>
<body>

<div class="container mt-4">
  <h1 class="text-center mb-4">Shop</h1>

  <div class="row">

    <div class="col-md-7 text-center" style="margin-top:100px;">
      <img src="catsprite.png" alt="Avatar" 
     style="width: 300px; height: 300px; position: fixed; top: 150px; left: 300px; z-index: 2;">
    </div>

    <div class="col-md-7 text-center" style="margin-top:200px;">
        <img src="https://img.freepik.com/free-vector/white-realistic-3d-podium-with-empty-space_331749-984.jpg?semt=ais_incoming&w=740&q=80" alt="Podium for your Avatar" 
       style="width: 300px; height: 300px; position: fixed; top: 275px; left: 300px; z-index: 1;">
      </div>

    <div class="col-md-5">
      <div class="row row-cols-1 row-cols-md-3 g-3">


        <div class="col">
          <div class="card h-100">
            <img src="https://www.pikpng.com/pngl/m/534-5349664_medieval-sword-png-sword-clipart.png" class="card-img-top" alt="Sword">
            <div class="card-body">
              <h5 class="card-title">Short Longsword</h5>
              <p class="card-text">Cost: 100 gold</p>
              <button class= "btn btn-primary" style="margin-top:10px;">Buy</button>
            </div>
          </div>
        </div>

        <div class="col">
          <div class="card h-100">
            <img src="https://thumbs.dreamstime.com/b/dramatic-photo-fiery-sword-dark-backdrop-glowing-weapon-breaking-rocks-represents-power-action-battle-illustration-413971872.jpg" class="card-img-top" alt="Sword">
            <div class="card-body">
              <h5 class="card-title">Nuclear Flamebringer Deathknife</h5>
              <p class="card-text">Cost: 200 gold</p>
              <button class= "btn btn-primary" style="margin-top:10px;">Buy</button>
            </div>
          </div>
        </div>
        

        <div class="col">
          <div class="card h-100">
            <img src="https://thumbs.dreamstime.com/b/intricate-blue-crystal-fantasy-ice-sword-white-light-gradient-like-texture-unique-hilt-design-against-background-387518192.jpg" class="card-img-top" alt="Sword">
            <div class="card-body">
              <h5 class="card-title">Chilly Cutlass</h5>
              <p class="card-text">Cost: 300 gold</p>
              <button class= "btn btn-primary" style="margin-top:10px;">Buy</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <br>
  <a href="main.html" class="btn btn-secondary" style="margin-top: 800px;">Back</a>

</div>

</body>
</html>
